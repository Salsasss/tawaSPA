<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad-horchata" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffdfa"/>
      <stop offset="100%" stop-color="#f5e6d3"/>
    </radialGradient>
    <linearGradient id="horchata-liquid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffff5"/>
      <stop offset="60%" stop-color="#faebd7"/>
      <stop offset="100%" stop-color="#e3cbab"/>
    </linearGradient>
    <linearGradient id="glass-shading" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="shadow-horchata" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#543c1c" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bg-grad-horchata)"/>
  <!-- Tall Glass liquid -->
  <path d="M 75,60 L 125,60 L 118,155 L 82,155 Z" fill="url(#horchata-liquid)" filter="url(#shadow-horchata)"/>
  <!-- Cinnamon Stick leaning inside -->
  <rect x="74" y="48" width="8" height="100" rx="3" transform="rotate(-15, 78, 98)" fill="#784715" filter="url(#shadow-horchata)"/>
  <rect x="76" y="48" width="4" height="100" rx="1.5" transform="rotate(-15, 78, 98)" fill="#a86d32"/>
  <!-- Glistening Ice Cubes inside -->
  <rect x="85" y="85" width="22" height="22" rx="4" transform="rotate(10, 96, 96)" fill="#ffffff" opacity="0.4"/>
  <rect x="96" y="112" width="20" height="20" rx="4" transform="rotate(-20, 106, 122)" fill="#ffffff" opacity="0.4"/>
  <!-- Ground cinnamon dust on top -->
  <ellipse cx="100" cy="65" rx="18" ry="4" fill="#a86d32" opacity="0.6" filter="url(#shadow-horchata)"/>
  <circle cx="92" cy="63" r="1" fill="#784715"/>
  <circle cx="104" cy="66" r="1.5" fill="#784715"/>
  <circle cx="98" cy="64" r="1.2" fill="#784715"/>
  <circle cx="108" cy="63" r="1" fill="#784715"/>
  <!-- Glass Shading & Highlights -->
  <path d="M 75,60 L 125,60 L 118,155 L 82,155 Z" fill="url(#glass-shading)" opacity="0.3"/>
  <path d="M 75,60 L 82,155 C 82,157 84,158 86,158 L 114,158 C 116,158 118,157 118,155 L 125,60" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>
  <!-- Red/white retro paper straw -->
  <path d="M 112,40 L 105,62 L 112,145" fill="none" stroke="#e63e3e" stroke-dasharray="8,6" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>
</svg>
