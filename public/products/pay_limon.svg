<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad-pay" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7fff9"/>
      <stop offset="100%" stop-color="#d4ffd9"/>
    </radialGradient>
    <linearGradient id="crust-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8bf7d"/>
      <stop offset="100%" stop-color="#b07d35"/>
    </linearGradient>
    <linearGradient id="lime-filling-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3ffd4"/>
      <stop offset="100%" stop-color="#a4db81"/>
    </linearGradient>
    <filter id="shadow-pay" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#2a5732" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bg-grad-pay)"/>
  <!-- Premium plate -->
  <circle cx="100" cy="100" r="72" fill="#ffffff" filter="url(#shadow-pay)"/>
  <!-- Slice of key lime pie -->
  <!-- Graham cracker crust -->
  <path d="M 52,118 L 112,130 Q 115,130 115,127 L 148,93 C 150,91 148,87 145,88 L 142,93 L 112,126 L 52,114 Z" fill="url(#crust-grad)" filter="url(#shadow-pay)"/>
  <!-- Crust edge height -->
  <path d="M 142,93 L 145,88 L 145,62 L 142,67 Z" fill="url(#crust-grad)"/>
  <!-- Smooth Lime Filling -->
  <path d="M 55,112 L 115,125 L 142,92 L 142,67 L 115,95 L 55,82 Z" fill="url(#lime-filling-grad)" filter="url(#shadow-pay)"/>
  <!-- Top surface of pie slice -->
  <path d="M 55,82 L 115,95 L 138,58 L 50,72 Z" fill="#eefce6"/>
  <!-- Whipped cream dollop -->
  <circle cx="98" cy="72" r="9" fill="#ffffff" filter="url(#shadow-pay)"/>
  <circle cx="99" cy="70" r="6" fill="#fffaf7"/>
  <!-- Green Lime Wheel Garnish -->
  <circle cx="98" cy="58" r="11" fill="#46ad36" filter="url(#shadow-pay)"/>
  <circle cx="98" cy="58" r="9.5" fill="#c3fca9"/>
  <!-- Lime segments inside wheel -->
  <path d="M 98,58 L 98,49 M 98,58 L 98,67 M 98,58 L 89,58 M 98,58 L 107,58 M 98,58 L 92,52 M 98,58 L 104,64 M 98,58 L 92,64 M 98,58 L 104,52" fill="none" stroke="#46ad36" stroke-width="1"/>
</svg>
