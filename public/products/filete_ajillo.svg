<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad-ajillo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffcf7"/>
      <stop offset="100%" stop-color="#ffe9ce"/>
    </radialGradient>
    <linearGradient id="fish-grad-ajillo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7b76d"/>
      <stop offset="60%" stop-color="#cf7a21"/>
      <stop offset="100%" stop-color="#914d0a"/>
    </linearGradient>
    <filter id="shadow-ajillo" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#5c3815" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bg-grad-ajillo)"/>
  <!-- Premium plate -->
  <circle cx="100" cy="100" r="72" fill="#ffffff" filter="url(#shadow-ajillo)"/>
  <circle cx="100" cy="100" r="62" fill="none" stroke="#f2ebd9" stroke-width="2"/>
  <circle cx="100" cy="100" r="60" fill="none" stroke="#e3d6bc" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Fish Fillet -->
  <path d="M 55,105 C 55,75 75,65 110,65 C 135,65 150,85 150,110 C 150,128 132,138 110,138 C 75,138 55,125 55,105 Z" fill="url(#fish-grad-ajillo)" filter="url(#shadow-ajillo)"/>
  <!-- Sear marks / texture -->
  <path d="M 75,85 C 80,87 90,88 95,87" fill="none" stroke="#5e3003" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M 80,105 C 87,108 97,109 105,107" fill="none" stroke="#5e3003" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M 90,122 C 98,124 108,123 118,120" fill="none" stroke="#5e3003" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Butter / Ajillo oil glaze -->
  <path d="M 68,90 C 80,75 115,70 132,95 C 140,105 130,128 105,128 C 80,128 65,110 68,90 Z" fill="none" stroke="#fcd45c" stroke-width="4" stroke-linecap="round" opacity="0.6" stroke-dasharray="10, 15"/>
  <!-- Garlic chips (Ajillo) -->
  <path d="M 85,80 C 87,78 92,79 94,82 C 95,85 92,88 88,87 C 84,86 83,82 85,80 Z" fill="#fcf0d4" stroke="#cfa151" stroke-width="1.5" filter="url(#shadow-ajillo)"/>
  <path d="M 120,78 C 122,76 127,77 129,80 C 130,83 127,86 123,85 C 119,84 118,80 120,78 Z" fill="#fcf0d4" stroke="#cfa151" stroke-width="1.5" filter="url(#shadow-ajillo)"/>
  <path d="M 102,112 C 104,110 109,111 111,114 C 112,117 109,120 105,119 C 101,118 100,114 102,112 Z" fill="#fcf0d4" stroke="#cfa151" stroke-width="1.5" filter="url(#shadow-ajillo)"/>
  <path d="M 125,108 C 127,106 132,107 134,110 C 135,113 132,116 128,115 C 124,114 123,110 125,108 Z" fill="#fcf0d4" stroke="#cfa151" stroke-width="1.5" filter="url(#shadow-ajillo)"/>
  <!-- Guajillo Chili rings -->
  <circle cx="90" cy="98" r="5.5" fill="none" stroke="#b01010" stroke-width="3.5" filter="url(#shadow-ajillo)"/>
  <circle cx="90" cy="98" r="2" fill="#ffe066"/>
  <circle cx="112" cy="90" r="5" fill="none" stroke="#b01010" stroke-width="3" filter="url(#shadow-ajillo)"/>
  <circle cx="112" cy="90" r="1.5" fill="#ffe066"/>
  <circle cx="128" cy="122" r="6" fill="none" stroke="#b01010" stroke-width="3.5" filter="url(#shadow-ajillo)"/>
  <circle cx="128" cy="122" r="2" fill="#ffe066"/>
  <!-- Parsley / Herbs flakes -->
  <path d="M 72,110 Q 75,107 72,105 Q 69,107 72,110 Z" fill="#2e873a"/>
  <path d="M 100,75 Q 103,72 100,70 Q 97,72 100,75 Z" fill="#2e873a"/>
  <path d="M 138,95 Q 141,92 138,90 Q 135,92 138,95 Z" fill="#2e873a"/>
  <path d="M 115,128 Q 118,125 115,123 Q 112,125 115,128 Z" fill="#2e873a"/>
  <!-- Fresh Lime wedge -->
  <path d="M 125,125 Q 140,110 155,130 Q 145,145 125,125 Z" fill="#329e41" filter="url(#shadow-ajillo)"/>
  <path d="M 128,127 Q 138,115 150,131 Q 142,140 128,127 Z" fill="#a3f7ad"/>
  <path d="M 132,130 Q 138,122 145,132" fill="none" stroke="#329e41" stroke-width="1.5"/>
</svg>
